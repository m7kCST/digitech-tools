  html += '<div class="diff-card foundation"><h3>Foundation <span class="range">Tasks ' + fRange + '</span></h3><p>' + esc(LESSON.tierDesc.f) + '</p></div>';
  html += '<div class="diff-card standard"><h3>Standard <span class="range">Tasks ' + sRange + '</span></h3><p>' + esc(LESSON.tierDesc.s) + '</p></div>';
  html += '<div class="diff-card extension"><h3>Extension <span class="range">Tasks ' + eRange + '</span></h3><p>' + esc(LESSON.tierDesc.e) + '</p></div>';
  html += '</div></div>';

  // 12. Task breakdown
  html += '<div class="card"><div class="card-label">Task breakdown</div><table><tr><th>Task</th><th>Description</th><th>Level</th></tr>';
  var tierName = { f: 'Foundation', s: 'Standard', e: 'Extension' };
  LESSON.tasks.forEach(function (t) {
    html += '<tr><td>' + t.num + '</td><td>' + esc(t.desc) + '</td><td><span class="tier-pill ' + t.tier + '">' + tierName[t.tier] + '</span></td></tr>';
  });
  html += '</table></div>';

  // 13. Curriculum links
  html += '<div class="card"><div class="card-label">Curriculum links</div>';
  LESSON.acCodes.forEach(function (code) {
    html += '<div class="ac-item"><span class="ac-badge">' + esc(code) + '</span><span>' + esc(AC_DESC[code] || '') + '</span></div>';
  });
  html += '</div>';

  // 14. Assessment and evidence
  html += '<div class="card"><div class="card-label">Assessment and evidence</div><table><tr><th>Evidence</th><th>What Mr Miller looks for</th></tr>';
  LESSON.assessment.forEach(function (a) {
    html += '<tr><td>' + esc(a.evidence) + '</td><td>' + esc(a.lookFor) + '</td></tr>';
  });
  html += '</table></div>';

  // 15. Contact
  html += '<div class="card"><div class="card-label">Contact</div>';
  html += '<p>Mr Miller, Digital Technologies<br>Emmanuel Christian School<br>Questions or absences - please contact via SEQTA or the school office.</p>';
  html += '</div>';

  // 16. Footer
  html += '<div class="footer-block">' + esc(LESSON.year) + ' - ' + esc(LESSON.topic) + ' - ' + partLabel + ' - Emmanuel Christian School - Mr Miller</div>';

  root.innerHTML = html;
})();

</script>
