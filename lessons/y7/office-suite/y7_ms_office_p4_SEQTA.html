    success_criteria: L.successCriteria.map(c => 'I can ' + c.replace(/^I can /i,'')).join(' | '),
    tasks           : L.tasks.map(t => t.desc).join(' | '),
    key_concepts    : L.acCodes.join(', '),
    current         : 'false',
    locked          : 'false'
  };

  const existing = document.getElementById('page-meta');
  if (existing) {
    existing.textContent = JSON.stringify(meta, null, 2);
  } else {
    const s = document.createElement('script');
    s.type = 'application/json';
    s.id   = 'page-meta';
    s.textContent = JSON.stringify(meta, null, 2);
    document.head.appendChild(s);
  }

})();
</script>
