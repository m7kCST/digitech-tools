<!-- ============================================================
     DRIVE URL FOOTER - paste this at the bottom of every HTML
     resource, just before </body>
     ============================================================ -->

<!-- Hidden drive metadata - read by the converter -->
<div id="drive-meta" style="display:none">
  DRIVE-URL: 
</div>

<!-- Drive URL setter button - visible to Mr Miller only when ?setup=1 is in the URL -->
<div id="drive-setter" style="display:none;position:fixed;bottom:16px;right:16px;z-index:9999">
  <button onclick="document.getElementById('drive-setter-panel').style.display='block';this.style.display='none'"
    style="background:#185FA5;color:white;border:none;border-radius:8px;padding:8px 14px;font-size:12px;font-family:sans-serif;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.2)">
    &#128279; Set Drive URL
  </button>
  <div id="drive-setter-panel" style="display:none;background:white;border-radius:10px;padding:14px;box-shadow:0 4px 20px rgba(0,0,0,.15);width:320px;border:1px solid #e2e2dc">
    <div style="font-size:12px;font-weight:600;margin-bottom:6px;font-family:sans-serif">Set Google Drive URL</div>
    <div style="font-size:11px;color:#6b7280;margin-bottom:8px;font-family:sans-serif">Paste the shareable Drive link for this file. It will be saved into the page and extracted by the converter.</div>
    <input id="drive-url-input" type="text" placeholder="https://drive.google.com/file/d/..."
      style="width:100%;padding:7px 9px;border-radius:6px;border:1px solid #e2e2dc;font-size:12px;font-family:monospace;outline:none;margin-bottom:8px" />
    <div id="drive-url-current" style="font-size:10px;color:#6b7280;font-family:monospace;margin-bottom:8px;word-break:break-all"></div>
    <div style="display:flex;gap:6px">
      <button onclick="saveDriveURL()"
        style="flex:1;background:#3B6D11;color:white;border:none;border-radius:6px;padding:7px;font-size:12px;font-family:sans-serif;cursor:pointer">
        &#10003; Save
      </button>
      <button onclick="copyDriveURL()"
        style="background:#f0f0ec;color:#3a3f4d;border:1px solid #e2e2dc;border-radius:6px;padding:7px 10px;font-size:12px;font-family:sans-serif;cursor:pointer">
        &#10064; Copy HTML
      </button>
      <button onclick="document.getElementById('drive-setter-panel').style.display='none';document.querySelector('#drive-setter button').style.display='block'"
        style="background:#f0f0ec;color:#6b7280;border:1px solid #e2e2dc;border-radius:6px;padding:7px 10px;font-size:12px;font-family:sans-serif;cursor:pointer">
        &#10005;
      </button>
    </div>
    <div id="drive-setter-msg" style="font-size:11px;margin-top:6px;font-family:sans-serif;display:none"></div>
  </div>
</div>

<script>
// Show the setter button only when ?setup=1 is in the URL
// e.g. open the file as: yourfile.html?setup=1
(function(){
  if(window.location.search.includes('setup=1') || window.location.search.includes('setup=true')){
    document.getElementById('drive-setter').style.display='block';
    // Show current URL if set
    const meta=document.getElementById('drive-meta');
    if(meta){
      const match=meta.textContent.match(/DRIVE-URL:\s*(\S+)/);
      if(match&&match[1]){
        document.getElementById('drive-url-current').textContent='Current: '+match[1];
        document.getElementById('drive-url-input').value=match[1];
      }
    }
  }
})();

function saveDriveURL(){
  const url=document.getElementById('drive-url-input').value.trim();
  if(!url){showMsg('Please paste a Drive URL first','#A32D2D');return;}
  if(!url.includes('drive.google.com')&&!url.includes('docs.google.com')){
    showMsg('That does not look like a Google Drive URL','#A32D2D');return;
  }
  // Update the hidden meta div
  const meta=document.getElementById('drive-meta');
  if(meta) meta.textContent='\n  DRIVE-URL: '+url+'\n';
  document.getElementById('drive-url-current').textContent='Current: '+url;
  showMsg('Saved! Now use "Copy HTML" to get the updated page code, or use the converter directly.','#3B6D11');
}

function copyDriveURL(){
  const url=document.getElementById('drive-url-input').value.trim();
  if(!url){showMsg('Set a URL first','#A32D2D');return;}
  // Build the updated footer snippet
  const snippet=`<div id="drive-meta" style="display:none">\n  DRIVE-URL: ${url}\n</div>`;
  navigator.clipboard.writeText(snippet).then(()=>showMsg('Footer snippet copied - paste it into your file','#3B6D11'));
}

function showMsg(msg,color){
  const el=document.getElementById('drive-setter-msg');
  el.style.display='block';
  el.style.color=color||'#3B6D11';
  el.textContent=msg;
  setTimeout(()=>el.style.display='none',4000);
}
</script>

<!-- ============================================================
     END DRIVE URL FOOTER
     ============================================================ -->
