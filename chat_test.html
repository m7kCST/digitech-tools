<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Chat Test</title>
<style>
body{font-family:sans-serif;padding:20px;max-width:600px;margin:0 auto}
button{padding:10px 20px;background:#185FA5;color:white;border:none;border-radius:6px;cursor:pointer;font-size:14px;margin:5px}
pre{background:#111;color:#7ec87e;padding:15px;border-radius:6px;white-space:pre-wrap;word-break:break-all;font-size:12px;margin-top:10px}
.err{color:#e87e7e}
</style>
</head>
<body>
<h2>Chat Action Test</h2>
<p>Tests the public chat action directly - no token needed.</p>
<button onclick="testChat()">Test chat action</button>
<button onclick="testPing()">Test ping</button>
<pre id="out">Click a button to test...</pre>
<script>
const URL = 'https://script.google.com/macros/s/AKfycbyI3rLMihOmZz_Ewq64bbuLnUNZIyP8UimLmYZIqi2Any1XrXgTtJdjZvuvvn8sPLVA/exec';

async function testPing() {
  document.getElementById('out').textContent = 'Testing ping...';
  try {
    const r = await fetch(URL + '?action=ping');
    const d = await r.json();
    document.getElementById('out').textContent = JSON.stringify(d, null, 2);
  } catch(e) {
    document.getElementById('out').className = 'err';
    document.getElementById('out').textContent = 'Error: ' + e.message;
  }
}

async function testChat() {
  document.getElementById('out').textContent = 'Testing chat action...';
  try {
    const r = await fetch(URL, {
      method: 'POST',
      headers: {'Content-Type': 'text/plain'},
      body: JSON.stringify({
        action: 'chat',
        class: '7',
        mode: 'explain',
        messages: [{role: 'user', content: 'What is RAM? Keep it very short.'}]
      })
    });
    const d = await r.json();
    document.getElementById('out').textContent = JSON.stringify(d, null, 2);
  } catch(e) {
    document.getElementById('out').className = 'err';
    document.getElementById('out').textContent = 'Error: ' + e.message;
  }
}
</script>
</body>
</html>
